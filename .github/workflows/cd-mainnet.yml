name: CD - Mainnet

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "mainnet"
        type: choice
        options:
          - mainnet

env:
  RUST_TOOLCHAIN: "1.94.1"
  SOROBAN_CLI_VERSION: "26.1.0"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # STAGE 0: Manual Approval
  # ============================================================================

  deploy-approval:
    name: Mainnet Deployment Approval
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - name: Wait for Approval
        run: |
          echo "Deployment approved for mainnet"
          echo "This step requires manual approval in GitHub Actions UI"

  # ============================================================================
  # STAGE 1: Build Contracts
  # ============================================================================

  build-contracts:
    name: Build Contracts
    runs-on: ubuntu-latest
    needs: deploy-approval
    outputs:
      contracts-built: ${{ steps.build.outputs.contracts-built }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Install Soroban CLI
        run: cargo install --locked --version ${{ env.SOROBAN_CLI_VERSION }} soroban-cli

      - name: Build Contracts
        id: build
        run: |
          cd contracts
          cargo build --locked --target wasm32-unknown-unknown --release
          echo "contracts-built=true" >> $GITHUB_OUTPUT

      - name: Upload Contract Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: traqora-contracts-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

  # ============================================================================
  # STAGE 2: Deploy Contracts to Mainnet
  # ============================================================================

  deploy-contracts:
    name: Deploy Contracts to Mainnet
    runs-on: ubuntu-latest
    needs: [deploy-approval, build-contracts]
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Download Contract Artifacts
        uses: actions/download-artifact@v4
        with:
          name: traqora-contracts-wasm
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install Soroban CLI
        run: cargo install --locked --version ${{ env.SOROBAN_CLI_VERSION }} soroban-cli

      - name: Deploy to Mainnet
        env:
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_MAINNET_SECRET_KEY }}
          NETWORK: mainnet
          RPC_URL: https://soroban-rpc.mainnet.stellar.org:443
          NETWORK_PASSPHRASE: "Public Global Stellar Network ; October 2015"
        run: |
          soroban network add --rpc-url $RPC_URL --network-passphrase "$NETWORK_PASSPHRASE" $NETWORK
          echo "$SOROBAN_SECRET_KEY" > secret.txt
          soroban config identity add --secret-key deployer < secret.txt
          rm secret.txt

          # Deploy booking contract
          CONTRACT_ID=$(soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/booking.wasm \
            --source deployer \
            --network $NETWORK)

          echo "Mainnet Deployed Contract ID: $CONTRACT_ID"
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV

      - name: Output Contract IDs
        run: |
          echo "Contract deployed to mainnet: ${{ env.CONTRACT_ID }}"

  # ============================================================================
  # STAGE 3: Build and Deploy Application
  # ============================================================================

  deploy-app:
    name: Build and Deploy App to Mainnet
    runs-on: ubuntu-latest
    needs: [deploy-approval, deploy-contracts]
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Backend
        run: npm run build --workspace=packages/backend

      - name: Build Client
        run: npm run build --workspace=packages/client

      - name: Deploy to Mainnet
        run: |
          echo "Deploying application components to mainnet..."
          # Add actual deployment commands here
          # This could involve:
          # - Building Docker images
          # - Pushing to registry
          # - Updating Kubernetes manifests
          # - Running database migrations
          # - Smoke tests against production
          echo "Deployment to mainnet completed successfully"

  # ============================================================================
  # STAGE 4: Post-Deployment Verification
  # ============================================================================

  verify-deployment:
    name: Verify Mainnet Deployment
    runs-on: ubuntu-latest
    needs: [deploy-contracts, deploy-app]
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests against mainnet..."
          # Add smoke test commands here
          # - Health check endpoints
          # - Contract interaction tests
          # - API connectivity tests
          echo "Smoke tests passed"

  # ============================================================================
  # STAGE 5: Notification
  # ============================================================================

  notify:
    name: Notification
    needs: [deploy-contracts, deploy-app, verify-deployment]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Deployment Status
        run: |
          if [ "${{ needs.deploy-contracts.result }}" == "success" ] && \
             [ "${{ needs.deploy-app.result }}" == "success" ] && \
             [ "${{ needs.verify-deployment.result }}" == "success" ]; then
            echo "✅ Deployment to Mainnet successful!"
            # Add Slack/Discord notification here if needed
            # Example: curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"Mainnet deployment successful"}'
          else
            echo "❌ Deployment to Mainnet failed."
            echo "Contracts: ${{ needs.deploy-contracts.result }}"
            echo "App: ${{ needs.deploy-app.result }}"
            echo "Verification: ${{ needs.verify-deployment.result }}"
            # Add failure notification here
            exit 1
          fi
