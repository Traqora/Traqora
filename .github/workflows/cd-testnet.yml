name: CD - Testnet

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: "1.94.1"
  SOROBAN_CLI_VERSION: "26.1.0"
  NODE_VERSION: "20"

jobs:
  # ============================================================================
  # STAGE 1: Build Contracts
  # ============================================================================

  build-contracts:
    name: Build Contracts
    runs-on: ubuntu-latest
    outputs:
      contracts-built: ${{ steps.build.outputs.contracts-built }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Install Soroban CLI
        run: cargo install --locked --version ${{ env.SOROBAN_CLI_VERSION }} soroban-cli

      - name: Build Contracts
        id: build
        run: |
          cd contracts
          cargo build --locked --target wasm32-unknown-unknown --release
          echo "contracts-built=true" >> $GITHUB_OUTPUT

      - name: Upload Contract Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: traqora-contracts-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ============================================================================
  # STAGE 2: Deploy Contracts to Testnet
  # ============================================================================

  deploy-contracts:
    name: Deploy Contracts to Testnet
    runs-on: ubuntu-latest
    needs: build-contracts
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Download Contract Artifacts
        uses: actions/download-artifact@v8
        with:
          name: traqora-contracts-wasm
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Install Soroban CLI
        run: cargo install --locked --version ${{ env.SOROBAN_CLI_VERSION }} soroban-cli

      - name: Deploy to Testnet
        env:
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
          NETWORK: testnet
          RPC_URL: https://soroban-testnet.stellar.org:443
          NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
        run: |
          soroban network add --rpc-url $RPC_URL --network-passphrase "$NETWORK_PASSPHRASE" $NETWORK
          echo "$SOROBAN_SECRET_KEY" > secret.txt
          soroban config identity add --secret-key deployer < secret.txt
          rm secret.txt

          # Deploy booking contract
          CONTRACT_ID=$(soroban contract deploy \
            --wasm contracts/target/wasm32-unknown-unknown/release/booking.wasm \
            --source deployer \
            --network $NETWORK)

          echo "Deployed Contract ID: $CONTRACT_ID"
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV

      - name: Output Contract IDs
        run: |
          echo "Contract deployed to testnet: ${{ env.CONTRACT_ID }}"

  # ============================================================================
  # STAGE 3: Build and Deploy Application
  # ============================================================================

  deploy-app:
    name: Build and Deploy App to Testnet
    runs-on: ubuntu-latest
    needs: deploy-contracts
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Backend
        run: npm run build --workspace=packages/backend

      - name: Build Client
        run: npm run build --workspace=packages/client

      - name: Deploy to Testnet
        run: |
          echo "Deploying application components to testnet..."
          # Add actual deployment commands here
          # This could involve:
          # - Building Docker images
          # - Pushing to registry
          # - Updating Kubernetes manifests
          # - Running database migrations
          echo "Deployment to testnet completed successfully"

  # ============================================================================
  # STAGE 4: Notification
  # ============================================================================

  notify:
    name: Notification
    needs: [deploy-contracts, deploy-app]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Deployment Status
        run: |
          if [ "${{ needs.deploy-contracts.result }}" == "success" ] && [ "${{ needs.deploy-app.result }}" == "success" ]; then
            echo "✅ Deployment to Testnet successful!"
            # Add Slack/Discord notification here if needed
          else
            echo "❌ Deployment to Testnet failed."
            echo "Contracts: ${{ needs.deploy-contracts.result }}"
            echo "App: ${{ needs.deploy-app.result }}"
            exit 1
          fi
